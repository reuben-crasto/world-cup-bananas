<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Group Stage | World Cup Bananas</title>

  <link rel="stylesheet" href="css/group_stage.css" />
  <script src="js/group_stage.js" defer></script>
</head>

<body>
  <header class="page-header">
    <a href="index.html" class="logo">
      <span class="logo-icon">🍌</span>
      <span>World Cup Bananas</span>
    </a>

    <div class="header-actions">
      <label for="autofillSelect">Autofill</label>
      <select id="autofillSelect">
        <option value="">Choose option</option>
        <option value="favorites">FIFA Ranking Favorites</option>
        <option value="balanced">Balanced Predictions</option>
        <option value="random">Random Scores</option>
        <option value="clear">Clear All Scores</option>
      </select>
    </div>
  </header>

  <main class="group-stage-page">
    <section class="page-title">
      <h1>Group Stage Predictions</h1>
      <p>
        Enter predicted scores for each match. The group table updates automatically.
      </p>
    </section>

    <section id="groupsContainer" class="groups-container">
      <!-- Group cards are generated by JavaScript -->
    </section>

    <section class="bottom-actions">
      <button id="saveBtn" class="save-btn" type="button">
        Save Predictions
      </button>

      <a href="index.html" class="secondary-btn">
        Back to Welcome
      </a>
    </section>
  </main>
</body>
</html>
